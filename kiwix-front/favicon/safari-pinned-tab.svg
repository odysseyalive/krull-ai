<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Krull favicon: parchment-gold mark on deep navy ground -->
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="100%" stop-color="#0b0e14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#d4a574" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="12" ry="12" fill="url(#g)"/>

  <!-- Soft warm glow behind the mark -->
  <circle cx="32" cy="32" r="22" fill="url(#glow)"/>

  <!-- Four-pointed star, parchment gold -->
  <path d="M32 8
           L36 28
           L56 32
           L36 36
           L32 56
           L28 36
           L8 32
           L28 28
           Z"
        fill="#d4a574"/>

  <!-- Tiny inner highlight to give the mark a subtle gem facet -->
  <path d="M32 14
           L34 30
           L50 32
           L34 34
           L32 50
           L30 34
           L14 32
           L30 30
           Z"
        fill="#f0c889" fill-opacity="0.6"/>
</svg>
