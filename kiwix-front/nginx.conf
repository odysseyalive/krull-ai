# Docker's embedded DNS resolver. With this, nginx will re-resolve
# krull-kiwix on every request (refreshed every 10s) instead of
# caching the IP it saw at startup. Without this, recreating the
# kiwix container puts the proxy into a 502 loop until you restart
# nginx — because nginx is talking to the old IP.
resolver 127.0.0.11 valid=10s ipv6=off;

# krull-kiwix-front: thin reverse proxy in front of kiwix-serve.
#
# Why this exists:
# 1) kiwix-serve compiles its skin assets (including the default favicons)
#    into a single statically-linked binary, so we can't bind-mount over
#    them. This nginx sits in front of kiwix on port 8090 and intercepts
#    /skin/favicon/* paths to serve Krull's parchment-gold mark instead.
#
# 2) kiwix-serve hardcodes a cacheid query string into every favicon link
#    in its HTML head (e.g. favicon-32x32.png?cacheid=79ded625). Browsers
#    cache favicons aggressively keyed on the full URL, so once a user has
#    visited kiwix once, the URL never changes — meaning a fresh proxy
#    behind it can't break the cache. We use sub_filter to rewrite those
#    cacheid query strings to a Krull-specific value, giving the browser
#    a new URL to fetch on the next page load.

server {
    listen 80 default_server;
    server_name _;

    # Cache policy for our intercepted favicons: no-cache forces the
    # browser to revalidate against our ETag on every request. The
    # response body itself is small and ETags handle 304s cheaply.
    # Once the rollout has settled we can swap this back to a longer
    # max-age, but during the transition no-cache is the right call.

    location = /skin/favicon/favicon.svg {
        alias /usr/share/nginx/favicon/favicon.svg;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /skin/favicon/favicon-16x16.png {
        alias /usr/share/nginx/favicon/favicon-16x16.png;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /skin/favicon/favicon-32x32.png {
        alias /usr/share/nginx/favicon/favicon-32x32.png;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /skin/favicon/apple-touch-icon.png {
        alias /usr/share/nginx/favicon/apple-touch-icon.png;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /skin/favicon/safari-pinned-tab.svg {
        alias /usr/share/nginx/favicon/safari-pinned-tab.svg;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /skin/favicon/favicon.ico {
        alias /usr/share/nginx/favicon/favicon.ico;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    # Top-level fallbacks some browsers ask for first.
    location = /favicon.ico {
        alias /usr/share/nginx/favicon/favicon.ico;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /favicon.svg {
        alias /usr/share/nginx/favicon/favicon.svg;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Krull dark theme stylesheet — bind-mounted from kiwix-front/krull/
    # on the host. There's no light theme and no runtime toggle; the
    # library is dark-only.
    location = /krull/dark.css {
        alias /usr/share/nginx/krull/dark.css;
        add_header Cache-Control "no-cache, must-revalidate";
        types { text/css css; }
        default_type text/css;
    }

    # Search redirect shim — rewires the welcome page's search box
    # from the stock library-metadata filter (q=) to full-text content
    # search across all ZIMs (/search?pattern=). See the file header
    # for the event-dispatch rationale.
    location = /krull/search.js {
        alias /usr/share/nginx/krull/search.js;
        add_header Cache-Control "no-cache, must-revalidate";
        types { application/javascript js; }
        default_type application/javascript;
    }

    # Everything else — pass through to kiwix-serve, but rewrite the HTML
    # response to swap kiwix's hardcoded cacheid values for Krull ones.
    # This gives the browser a NEW URL for each favicon link, bypassing
    # any previously-cached entry.
    location / {
        # Using a variable in proxy_pass forces nginx to re-resolve
        # the upstream hostname on every request (with the resolver
        # directive at the top of this file). This makes the proxy
        # tolerate kiwix container recreates without needing a restart.
        set $kiwix_upstream "http://krull-kiwix:8080";
        proxy_pass $kiwix_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Force kiwix to send uncompressed responses so sub_filter can
        # rewrite the body.
        proxy_set_header Accept-Encoding "";

        # Strip kiwix's own cache headers and force the browser to
        # always revalidate the HTML. Without this, browsers cling to
        # the pre-injection HTML across visits and never see our
        # sub_filter modifications (favicons, dark theme, toggle).
        proxy_hide_header Cache-Control;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Rewrite cacheid query strings on favicon paths so the browser
        # sees different URLs from any pre-Krull cache entries. The
        # specific cacheid values come from the kiwix-serve binary; if
        # those ever change in an upstream release we just see the old
        # ones pass through unchanged (still works, just doesn't bust
        # the cache for users on the new release).
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '/skin/favicon/favicon.ico?cacheid='        '/skin/favicon/favicon.ico?krull=1&cacheid=';
        sub_filter '/skin/favicon/favicon.svg?cacheid='        '/skin/favicon/favicon.svg?krull=1&cacheid=';
        sub_filter '/skin/favicon/favicon-16x16.png?cacheid='  '/skin/favicon/favicon-16x16.png?krull=1&cacheid=';
        sub_filter '/skin/favicon/favicon-32x32.png?cacheid='  '/skin/favicon/favicon-32x32.png?krull=1&cacheid=';
        sub_filter '/skin/favicon/apple-touch-icon.png?cacheid=' '/skin/favicon/apple-touch-icon.png?krull=1&cacheid=';
        sub_filter '/skin/favicon/safari-pinned-tab.svg?cacheid=' '/skin/favicon/safari-pinned-tab.svg?krull=1&cacheid=';

        # Inject the Krull dark theme. The inline early script sets the
        # krull-dark class on <html> BEFORE the body parses so the page
        # renders dark from the very first paint — no flash of
        # unstyled light content. The stylesheet link loads the dark
        # overrides. The library is dark-only; no toggle, no light mode.
        sub_filter '<head>' '<head><script>document.documentElement.classList.add("krull-dark");</script><link rel="stylesheet" href="/krull/dark.css"><script src="/krull/search.js" defer></script>';
    }
}
