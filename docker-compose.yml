services:
  ollama:
    image: ollama/ollama:latest
    container_name: krull-ollama
    restart: unless-stopped
    tty: true
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: krull-webui
    depends_on:
      - ollama
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - ./data/webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://krull-ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-generate-a-real-key}
      - WEBUI_AUTH=False
      - ENABLE_API_KEYS=True
      # Web search via SearXNG
      - ENABLE_RAG_WEB_SEARCH=True
      - RAG_WEB_SEARCH_ENGINE=searxng
      - RAG_WEB_SEARCH_RESULT_COUNT=5
      - SEARXNG_QUERY_URL=http://krull-searxng:8080/search?q=<query>
      # Playwright for full page fetching
      - RAG_WEB_LOADER_ENGINE=playwright

  searxng:
    image: searxng/searxng:latest
    container_name: krull-searxng
    restart: unless-stopped
    volumes:
      - ./data/searxng/settings.yml:/etc/searxng/settings.yml:rw
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  sse-proxy:
    build: ./proxy
    container_name: krull-sse-proxy
    depends_on:
      - ollama
      - searxng
      - photon
    restart: unless-stopped
    ports:
      - "4001:8081"
    environment:
      - OLLAMA_URL=http://krull-ollama:11434
      - SEARXNG_URL=http://krull-searxng:8080
      - KIWIX_URL=http://krull-kiwix:8080
      - ENABLE_WEB_SEARCH=true
      - ENABLE_KIWIX=true
      - ENABLE_DATE=true
      - ENABLE_MAP_SEARCH=true
      - PHOTON_URL=http://krull-photon:2322
      - TILESERVER_URL=http://localhost:8070
      - SEARCH_RESULTS=5
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-131072}
      - CONTEXT_COMPACT_LIMIT=${CONTEXT_COMPACT_LIMIT:-98304}
      - PORT=8081

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: krull-litellm
    depends_on:
      - sse-proxy
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm:/app/config
    command: ["--config", "/app/config/config.yaml", "--port", "4000"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev-key}

  tileserver:
    image: ghcr.io/maplibre/martin:latest
    container_name: krull-tileserver
    restart: unless-stopped
    volumes:
      - ./data/tiles:/data:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        has_tiles() { ls /data/*.pmtiles 1>/dev/null 2>&1 || ls /data/*.mbtiles 1>/dev/null 2>&1; }
        if has_tiles; then
          exec martin /data
        else
          echo "No tile files found in /data/. Waiting for .pmtiles or .mbtiles files..."
          while ! has_tiles; do sleep 30; done
          exec martin /data
        fi

  map-viewer:
    build: ./map-viewer
    container_name: krull-map-viewer
    depends_on:
      - tileserver
    restart: unless-stopped
    ports:
      - "8070:80"

  photon:
    image: rtuszik/photon-docker:latest
    container_name: krull-photon
    restart: unless-stopped
    ports:
      - "2322:2322"
    volumes:
      - ./data/photon:/photon/photon_data
    environment:
      - COUNTRY_CODE=${PHOTON_COUNTRY_CODE:-}

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: krull-kiwix
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - ./zim:/data:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if ls /data/*.zim 1>/dev/null 2>&1; then
          exec kiwix-serve /data/*.zim --address=all --port=8080
        else
          echo "No ZIM files found in /data/. Waiting for files..."
          while ! ls /data/*.zim 1>/dev/null 2>&1; do sleep 30; done
          exec kiwix-serve /data/*.zim --address=all --port=8080
        fi

