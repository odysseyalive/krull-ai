server {
    listen 80;
    root /usr/share/nginx/html;

    # Serve static map viewer files
    location = / {
        try_files /index.html =404;
    }
    location /lib/ {
        try_files $uri =404;
    }
    location /fonts/ {
        try_files $uri =404;
    }
    location ~ ^/style-.*\.json$ {
        try_files $uri =404;
    }

    # Everything else proxied to Martin (catalog, tile sources, tiles)
    location / {
        proxy_pass http://krull-tileserver:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
