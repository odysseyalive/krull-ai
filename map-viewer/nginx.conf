server {
    listen 80;
    root /usr/share/nginx/html;

    # Serve the Vite-built app and static assets
    location = / {
        try_files /index.html =404;
    }
    location = /favicon.svg {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location /assets/ {
        try_files $uri =404;
    }
    location /fonts/ {
        try_files $uri =404;
    }
    location /sprites/ {
        try_files $uri =404;
    }

    # Everything else proxied to Martin (catalog, tile sources, tiles)
    location / {
        proxy_pass http://krull-tileserver:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
