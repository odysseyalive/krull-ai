<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <meta name="theme-color" content="#0b0e14">
  <title>Krull AI — Offline Maps</title>
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Krull Maps</span>
      <button id="sidebar-close" class="sidebar-close" aria-label="Close sidebar">&times;</button>
    </div>

    <div class="sidebar-search">
      <input id="search" type="text" placeholder="Search places, roads, features..." autocomplete="off">
      <div id="results" class="search-results"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-header" data-toggle="styles">Map Style</div>
      <div class="section-body" id="style-options"></div>
    </div>

    <div class="sidebar-section" id="overlays-section" style="display:none">
      <div class="section-header" data-toggle="overlays">Overlays</div>
      <div class="section-body" id="overlay-options"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-header" data-toggle="labels">Labels</div>
      <div class="section-body" id="label-options"></div>
    </div>
  </aside>

  <!-- Map -->
  <div id="map"></div>

  <!-- Sidebar toggle (when closed) -->
  <button id="sidebar-open" class="sidebar-open" aria-label="Open sidebar">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Bottom bar -->
  <div id="bottom-bar" class="bottom-bar">
    <span id="coords" class="coords-display"></span>
    <span id="zoom-level" class="zoom-display"></span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
